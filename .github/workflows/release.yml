name: release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Job Go: permanece enquanto o fonte Go existir no repo (sai no flip).
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt found unformatted files:"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go (oráculo de paridade)
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Compilar oráculo Go do fonte
        run: |
          mkdir -p dist
          go build -o dist/kn-agente-oracle ./cmd/kn-agente
          dist/kn-agente-oracle versao

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar pytest
        run: python -m pip install pytest

      - name: Pytest (suíte completa, com paridade)
        run: KOINE_GO_BIN="$PWD/dist/kn-agente-oracle" python -m pytest -q

  build:
    name: Build pacote Python
    needs: [test-go, test-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Montar koine.pyz + zip de distribuição
        run: |
          python scripts/build-pyz.py --zip
          ls -lh dist/

      - name: Check tag == versão do pacote
        if: github.event_name == 'push'
        run: |
          V="$(python dist/koine.pyz versao | awk '{print $2}')"
          TAGV="${GITHUB_REF_NAME#v}"
          BASE="${TAGV%%-*}"
          if [ "$V" != "$BASE" ]; then
            echo "::error::versão do pacote (${V}) difere da tag (v${TAGV}) — bump _version.py/pyproject antes de re-taggear"
            exit 1
          fi
          # asset segue a TAG (rc: koine-0.4.0-rc.1.zip) — o installer monta o
          # nome do asset a partir da tag
          if [ "$TAGV" != "$V" ]; then
            mv "dist/koine-${V}.zip" "dist/koine-${TAGV}.zip"
          fi
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: koine-zip
          path: dist/koine-*.zip
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify install scripts exist
        run: |
          missing=0
          for script in install.sh install.ps1 install.bat; do
            if [ ! -f "scripts/release/${script}" ]; then
              echo "::error::scripts/release/${script} not found"
              missing=1
            fi
          done
          if [ "${missing}" = "1" ]; then
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Copy install scripts to dist
        run: |
          cp scripts/release/install.sh dist/
          cp scripts/release/install.ps1 dist/
          cp scripts/release/install.bat dist/
          ls -lh dist/

      - name: Build skills-mode zip
        run: |
          bash scripts/skills-mode/montar-zip.sh dist/koine-skills.zip
          ls -lh dist/koine-skills.zip

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "${TAG}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          NOTES_FILE=$(mktemp)

          if [ "${{ steps.prerelease.outputs.is_prerelease }}" = "true" ]; then
            echo "Pre-release ${TAG} — automated build for validation. See main release notes for details." > "${NOTES_FILE}"
            echo "notes_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Release oficial: exige seção no CHANGELOG
          awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > "${NOTES_FILE}"

          if [ ! -s "${NOTES_FILE}" ]; then
            echo "::error::CHANGELOG.md has no entry for ## [${VERSION}] — update CHANGELOG before re-publishing the tag."
            exit 1
          fi

          echo "notes_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          echo "---- Release notes ----"
          cat "${NOTES_FILE}"
          echo "---- End ----"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: |
            dist/koine-[0-9]*.zip
            dist/install.sh
            dist/install.ps1
            dist/install.bat
            dist/koine-skills.zip
            dist/SHA256SUMS
          fail_on_unmatched_files: true
